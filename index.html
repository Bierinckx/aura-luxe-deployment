/* ── Scroll reveal hook ── */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
      { threshold: 0.08 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

  return (

  );
}

                      ))}
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'22px'}}>
                      <span style={{fontFamily:'var(--fd)',fontSize:'1.2rem',fontWeight:'600'}}>Totaal</span>
                      <span style={{fontFamily:'var(--fd)',fontSize:'1.7rem',fontWeight:'700',color:'var(--gold)'}}>€{total.toFixed(2)}</span>
                    </div>
                    <button className="btn btn-dark" style={{width:'100%',padding:'14px'}} onClick={()=>setCheckoutStep(2)}>
                      Verder naar verzending <ChevronRight className="w-4 h-4"/>
                    </button>
                    <div style={{borderTop:'1px solid var(--border)',marginTop:'16px',paddingTop:'16px',display:'flex',flexDirection:'column',gap:'8px'}}>
                      {[[<Shield className="w-3.5 h-3.5"/>,'SSL-beveiligde verbinding'],[<RotateCcw className="w-3.5 h-3.5"/>,'30 dagen retour'],[<Package className="w-3.5 h-3.5"/>,'Gratis verzending boven €150']].map(([icon,text])=>(
                        <div key={text} className="trust-row">{icon}<span>{text}</span></div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* STEP 2: Shipping info */}
              {checkoutStep === 2 && (
                <div style={{display:'grid',gap:'24px'}} className="lg:grid-cols-3">
                  <div className="lg:col-span-2">
                    <div style={{background:'#fff',borderRadius:'22px',padding:'32px',border:'1px solid var(--border)'}}>
                      <h3 style={{fontFamily:'var(--fd)',fontSize:'1.5rem',fontWeight:'600',marginBottom:'24px',display:'flex',alignItems:'center',gap:'10px'}}><MapPin className="w-5 h-5" style={{color:'var(--gold)'}}/>Bezorgadres</h3>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
                        {[['voornaam','Voornaam','Jan'],['achternaam','Achternaam','Janssens']].map(([k,l,ph])=>(
                          <div key={k}>
                            <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>{l}</label>
                            <input className="checkout-field" placeholder={ph} value={shippingInfo[k]} onChange={e=>setShippingInfo(s=>({...s,[k]:e.target.value}))}/>
                          </div>
                        ))}
                      </div>
                      <div style={{marginTop:'14px'}}>
                        <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>E-mailadres</label>
                        <input className="checkout-field" type="email" placeholder="jan@example.com" value={shippingInfo.email} onChange={e=>setShippingInfo(s=>({...s,email:e.target.value}))}/>
                      </div>
                      <div style={{marginTop:'14px'}}>
                        <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>Straat & huisnummer</label>
                        <input className="checkout-field" placeholder="Kerkstraat 42" value={shippingInfo.adres} onChange={e=>setShippingInfo(s=>({...s,adres:e.target.value}))}/>
                      </div>
                      <div style={{marginTop:'14px',display:'grid',gridTemplateColumns:'140px 1fr',gap:'14px'}}>
                        <div>
                          <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>Postcode</label>
                          <input className="checkout-field" placeholder="9000" value={shippingInfo.postcode} onChange={e=>setShippingInfo(s=>({...s,postcode:e.target.value}))}/>
                        </div>
                        <div>
                          <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>Stad</label>
                          <input className="checkout-field" placeholder="Gent" value={shippingInfo.stad} onChange={e=>setShippingInfo(s=>({...s,stad:e.target.value}))}/>
                        </div>
                      </div>
                      <div style={{marginTop:'14px'}}>
                        <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>Land</label>
                        <select className="checkout-field" value={shippingInfo.land} onChange={e=>setShippingInfo(s=>({...s,land:e.target.value}))}>
                          {['België','Nederland','Luxemburg','Duitsland','Frankrijk'].map(l=><option key={l}>{l}</option>)}
                        </select>
                      </div>
                      <div style={{display:'flex',gap:'12px',marginTop:'28px',flexWrap:'wrap'}}>
                        <button className="btn btn-ghost" style={{width:'auto'}} onClick={()=>setCheckoutStep(1)}>← Terug</button>
                        <button className="btn btn-dark" style={{flex:1}}
                          onClick={()=>{
                            if(!shippingInfo.voornaam||!shippingInfo.achternaam||!shippingInfo.email||!shippingInfo.adres||!shippingInfo.postcode||!shippingInfo.stad){
                              addToast('Vul alle velden in om door te gaan');return;
                            }
                            setCheckoutStep(3);
                          }}>
                          Verder naar betaling <ChevronRight className="w-4 h-4"/>
                        </button>
                      </div>
                    </div>
                  </div>
                  <div style={{background:'#fff',borderRadius:'22px',padding:'26px',border:'1px solid var(--border)',alignSelf:'start'}}>
                    <h3 style={{fontFamily:'var(--fd)',fontSize:'1.2rem',fontWeight:'600',marginBottom:'16px'}}>Jouw bestelling</h3>
                    <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'16px',paddingBottom:'16px',borderBottom:'1px solid var(--border)'}}>
                      {cart.map(i=>(
                        <div key={i.id} style={{display:'flex',gap:'10px',alignItems:'center'}}>
                          <img src={i.image} alt={i.name} style={{width:'40px',height:'40px',objectFit:'cover',borderRadius:'8px',flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <p style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fd)'}}>{i.name}</p>
                            <p style={{fontSize:'11px',color:'var(--mid)',fontFamily:'var(--fb)'}}>×{i.quantity}</p>
                          </div>
                          <p style={{fontSize:'13px',fontWeight:'700',fontFamily:'var(--fd)',flexShrink:0}}>€{(i.price*i.quantity).toFixed(2)}</p>
                        </div>
                      ))}
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',fontFamily:'var(--fd)',fontWeight:'700',fontSize:'1.15rem'}}>
                      <span>Totaal</span>
                      <span style={{color:'var(--gold)'}}>€{total.toFixed(2)}</span>
                    </div>
                  </div>
                </div>
              )}

              {/* STEP 3: Payment */}
              {checkoutStep === 3 && (
                <div style={{display:'grid',gap:'24px'}} className="lg:grid-cols-3">
                  <div className="lg:col-span-2">
                    <div style={{background:'#fff',borderRadius:'22px',padding:'32px',border:'1px solid var(--border)'}}>
                      <h3 style={{fontFamily:'var(--fd)',fontSize:'1.5rem',fontWeight:'600',marginBottom:'24px',display:'flex',alignItems:'center',gap:'10px'}}>
                        <Lock className="w-5 h-5" style={{color:'var(--gold)'}}/>Veilige betaling
                      </h3>
                      <div style={{background:'rgba(139,105,20,0.06)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px 16px',marginBottom:'24px',display:'flex',alignItems:'center',gap:'10px'}}>
                        <Shield className="w-4 h-4 flex-shrink-0" style={{color:'var(--gold)'}}/>
                        <p style={{fontSize:'12px',color:'var(--mid)',fontFamily:'var(--fb)'}}>Betaling wordt verwerkt via <strong style={{color:'var(--dark)'}}>Stripe</strong>. Jouw gegevens zijn altijd beveiligd.</p>
                      </div>
                      <div style={{marginBottom:'14px'}}>
                        <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>Naam op kaart</label>
                        <input className="checkout-field" placeholder="Jan Janssens" value={payInfo.name} onChange={e=>setPayInfo(p=>({...p,name:e.target.value}))}/>
                      </div>
                      <div style={{marginBottom:'14px'}}>
                        <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>Kaartnummer</label>
                        <input className="checkout-field" placeholder="1234 5678 9012 3456" maxLength="19" value={payInfo.card}
                          onChange={e=>{
                            const v=e.target.value.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim().slice(0,19);
                            setPayInfo(p=>({...p,card:v}));
                          }}/>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:'28px'}}>
                        <div>
                          <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>Vervaldatum</label>
                          <input className="checkout-field" placeholder="MM/JJ" maxLength="5" value={payInfo.expiry}
                            onChange={e=>{
                              const v=e.target.value.replace(/\D/g,'');
                              setPayInfo(p=>({...p,expiry:v.length>2?v.slice(0,2)+'/'+v.slice(2,4):v}));
                            }}/>
                        </div>
                        <div>
                          <label style={{fontSize:'12px',fontWeight:'600',fontFamily:'var(--fb)',display:'block',marginBottom:'6px'}}>CVC</label>
                          <input className="checkout-field" placeholder="123" maxLength="3" value={payInfo.cvc} onChange={e=>setPayInfo(p=>({...p,cvc:e.target.value.replace(/\D/g,'').slice(0,3)}))} type="password"/>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:'12px',flexWrap:'wrap'}}>
                        <button className="btn btn-ghost" style={{width:'auto'}} onClick={()=>setCheckoutStep(2)}>← Terug</button>
                        <button className="btn btn-dark" style={{flex:1,padding:'15px'}} onClick={handleCheckoutPay}>
                          <Lock className="w-4 h-4"/> Betaal €{total.toFixed(2)} via Stripe
                        </button>
                      </div>
                    </div>
                  </div>
                  <div style={{alignSelf:'start'}}>
                    <div style={{background:'#fff',borderRadius:'22px',padding:'26px',border:'1px solid var(--border)',marginBottom:'14px'}}>
                      <h3 style={{fontFamily:'var(--fd)',fontSize:'1.2rem',fontWeight:'600',marginBottom:'16px'}}>Bezorgadres</h3>
                      <p style={{fontSize:'13px',fontFamily:'var(--fb)',lineHeight:'1.7',color:'var(--mid)'}}>
                        {shippingInfo.voornaam} {shippingInfo.achternaam}<br/>
                        {shippingInfo.adres}<br/>
                        {shippingInfo.postcode} {shippingInfo.stad}<br/>
                        {shippingInfo.land}
                      </p>
                    </div>
                    <div style={{background:'#fff',borderRadius:'22px',padding:'26px',border:'1px solid var(--border)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontFamily:'var(--fd)',fontWeight:'700',fontSize:'1.15rem'}}>
                        <span>Totaal</span>
                        <span style={{color:'var(--gold)'}}>€{total.toFixed(2)}</span>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </main>
      )}

      {/* ══ SUCCESS VIEW ══ */}
      {view === 'success' && (
        <main style={{maxWidth:'640px',margin:'0 auto',padding:'80px 24px',textAlign:'center'}}>
          <div style={{width:'80px',height:'80px',background:'linear-gradient(135deg,var(--gold),var(--gold-mid))',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 28px',boxShadow:'0 16px 48px rgba(139,105,20,0.3)'}}>
            <Check className="w-8 h-8" style={{color:'#fff'}}/>
          </div>
          <span className="eyebrow" style={{marginBottom:'20px',display:'inline-flex'}}>✦  Bestelling bevestigd</span>
          <h2 style={{fontFamily:'var(--fd)',fontSize:'clamp(2.4rem,6vw,3.8rem)',fontWeight:'600',color:'var(--dark)',marginBottom:'16px',lineHeight:'1.1'}}>
            Dank je, {shippingInfo.voornaam||'beauty lover'}!
          </h2>
          <p style={{color:'var(--mid)',fontFamily:'var(--fb)',lineHeight:'1.75',marginBottom:'32px'}}>
            Je bestelling <strong style={{color:'var(--dark)'}}>{orderNumber}</strong> is ontvangen. Je ontvangt een bevestiging op {shippingInfo.email||'jouw e-mailadres'}. Verwacht je glow binnen 2–4 werkdagen.
          </p>
          <div style={{background:'linear-gradient(135deg,#f5ece0,#ede0cf)',borderRadius:'20px',padding:'28px',marginBottom:'32px',border:'1px solid var(--border)'}}>
            <p style={{fontSize:'12px',color:'var(--mid)',letterSpacing:'2px',textTransform:'uppercase',fontFamily:'var(--fb)',marginBottom:'6px'}}>Bestelnummer</p>
            <p style={{fontFamily:'var(--fd)',fontSize:'1.8rem',fontWeight:'700',color:'var(--gold)'}}>{orderNumber}</p>
          </div>
          <div style={{display:'flex',gap:'12px',justifyContent:'center',flexWrap:'wrap'}}>
            <button className="btn btn-dark" style={{width:'auto'}} onClick={()=>{setView('shop');setOrderNumber('');}}>
              Verder winkelen<span className="btn-icon"><ArrowRight className="w-3 h-3"/></span>
            </button>
            <button className="btn btn-ghost" style={{width:'auto'}} onClick={()=>document.getElementById('newsletter')?.scrollIntoView({behavior:'smooth'})}>Blijf in de loop</button>
          </div>
        </main>
      )}

      {/* ── Product Modal ── */}
      {selectedProduct && (
        <div className="modal-backdrop" onClick={()=>setSelectedProduct(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="grid md:grid-cols-2">
              <div style={{position:'relative'}}>
                <img src={selectedProduct.image} alt={selectedProduct.name} loading="lazy"
                  style={{width:'100%',height:'100%',minHeight:'360px',objectFit:'cover',borderRadius:'2rem 0 0 2rem'}}/>
                <button onClick={()=>setSelectedProduct(null)}
                  style={{position:'absolute',top:'14px',right:'14px',background:'rgba(255,255,255,0.92)',backdropFilter:'blur(8px)',border:'none',borderRadius:'50%',width:'34px',height:'34px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                  <X className="w-4 h-4"/>
                </button>
                {selectedProduct.badge && (
                  <div style={{position:'absolute',bottom:'14px',left:'14px'}}>
                    <span className="badge badge-new">{selectedProduct.badge}</span>
                  </div>
                )}
              </div>
              <div style={{padding:'36px 32px',overflowY:'auto'}}>
                <div style={{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
                  <span className={`badge ${selectedProduct.type==='own'?'badge-own':'badge-prt'}`}>{selectedProduct.type==='own'?'AURA LUXE':'PARTNER'}</span>
                </div>
                <p style={{fontSize:'10px',color:'var(--mid)',letterSpacing:'2.5px',textTransform:'uppercase',marginBottom:'6px',fontWeight:'500',fontFamily:'var(--fb)'}}>{selectedProduct.category}</p>
                <h2 style={{fontFamily:'var(--fd)',fontSize:'1.9rem',fontWeight:'600',marginBottom:'10px',lineHeight:'1.1'}}>{selectedProduct.name}</h2>
                {selectedProduct.affiliate && <p style={{fontSize:'12px',color:'#c9956d',fontWeight:'500',marginBottom:'10px',fontFamily:'var(--fb)'}}>Gecureerd door {selectedProduct.affiliate}</p>}
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px'}}>
                  <Stars rating={selectedProduct.rating} size="lg"/>
                  <span style={{fontSize:'13px',color:'var(--mid)',fontFamily:'var(--fb)'}}>({selectedProduct.reviews.toLocaleString()} beoordelingen)</span>
                </div>
                <div style={{fontFamily:'var(--fd)',fontSize:'2.4rem',fontWeight:'700',color:'var(--gold)',marginBottom:'16px'}}>€{selectedProduct.price}</div>
                <div style={{background:'var(--gold-pale)',border:'1px solid rgba(232,221,208,0.7)',borderRadius:'14px',padding:'14px',marginBottom:'16px',fontSize:'13px',fontFamily:'var(--fb)'}}>
                  <p style={{fontWeight:'600',marginBottom:'5px'}}>{selectedProduct.type==='own'?'✨ AURA Crafted':'🤝 Partner Pick'}</p>
                  <p style={{color:'var(--mid)',lineHeight:'1.6'}}>{selectedProduct.type==='own'?'Gemaakt met intentie. Onze eigen premium collectie voor jouw unieke glow.':'Wereldwijd gecureerde excellentie. Transparante commissie — zelfde prijs als bij de partner.'}</p>
                </div>
                <p style={{fontSize:'13px',color:'var(--mid)',lineHeight:'1.75',marginBottom:'20px',fontFamily:'var(--fb)'}}>{selectedProduct.description}</p>
                {selectedProduct.shade && (
                  <div style={{marginBottom:'20px'}}>
                    <p style={{fontSize:'12px',fontWeight:'600',marginBottom:'8px',fontFamily:'var(--fb)'}}>Kleur: <span style={{color:'var(--gold)'}}>{selectedProduct.shade}</span></p>
                    <div style={{display:'flex',gap:'8px'}}>
                      {[['#F5D5B0','Light Beige'],['#F0C4A0','Medium'],['#D4956A','Deep']].map(([bg,name])=>(
                        <button key={name} title={name} style={{width:'30px',height:'30px',background:bg,borderRadius:'50%',border:'2px solid rgba(28,28,30,0.12)',cursor:'pointer',transition:'transform 250ms var(--spring)',flexShrink:0}}
                          onMouseEnter={e=>e.target.style.transform='scale(1.18)'} onMouseLeave={e=>e.target.style.transform='scale(1)'}/>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {selectedProduct.type==='affiliate' ? (
                    <button className="btn btn-amber" style={{fontSize:'13px',padding:'14px'}} onClick={()=>addToCart(selectedProduct)}>Ontdekken bij {selectedProduct.affiliate}</button>
                  ) : (
                    <button className="btn btn-dark" style={{width:'100%',padding:'14px',fontSize:'13px'}} onClick={()=>addToCart(selectedProduct)}>
                      Voeg toe aan Glow<span className="btn-icon"><ArrowRight className="w-3 h-3"/></span>
                    </button>
                  )}
                  <button
                    className={`heart-btn ${wishlist.find(w=>w.id===selectedProduct.id)?'active':''}`}
                    style={{width:'100%',padding:'12px',borderRadius:'100px',border:'1.5px solid rgba(28,28,30,0.18)',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',fontSize:'13px',fontFamily:'var(--fb)',fontWeight:'500',transition:'border-color 200ms,background 200ms'}}
                    onClick={()=>toggleWishlist(selectedProduct)}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='var(--dark)'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(28,28,30,0.18)'}
                  >
                    <Heart className={`w-4 h-4 ${wishlist.find(w=>w.id===selectedProduct.id)?'fill-red-500 text-red-500':'text-gray-500'}`}/>
                    {wishlist.find(w=>w.id===selectedProduct.id)?'Verwijder uit verlanglijst':'Voeg toe aan verlanglijst'}
                  </button>
                </div>
                <div style={{borderTop:'1px solid var(--border)',marginTop:'18px',paddingTop:'16px',display:'flex',flexDirection:'column',gap:'6px'}}>
                  {['✓ Gratis verzending boven €150','✓ 30 dagen retour','✓ Cruelty-free & vegan gecertificeerd'].map(t=>(
                    <p key={t} style={{fontSize:'12px',color:'var(--mid)',fontFamily:'var(--fb)'}}>{t}</p>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Footer ── */}
      <footer className="site-footer">
        <div style={{maxWidth:'1120px',margin:'0 auto',padding:'0 24px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'40px',marginBottom:'40px'}}>
            <div>
              <h3 style={{fontFamily:'var(--fd)',fontSize:'1.6rem',fontWeight:'700',color:'var(--gold)',marginBottom:'8px'}}>AURA LUXE</h3>
              <p style={{fontSize:'13px',color:'var(--mid)',lineHeight:'1.7',fontFamily:'var(--fb)',maxWidth:'240px'}}>Luxury beauty voor iedereen die haar unieke glans wil omarmen.</p>
            </div>
            <div>
              <p style={{fontSize:'11px',fontWeight:'600',letterSpacing:'2px',textTransform:'uppercase',fontFamily:'var(--fb)',marginBottom:'14px',color:'var(--dark)'}}>Shop</p>
              {['Alle producten','AURA Crafted','Partner Picks','Nieuwe arrivals','Bestsellers'].map(l=>(
                <button key={l} onClick={()=>{setView('shop');}} style={{display:'block',fontSize:'13px',color:'var(--mid)',fontFamily:'var(--fb)',background:'none',border:'none',cursor:'pointer',marginBottom:'8px',textAlign:'left',transition:'color 200ms'}}
                  onMouseEnter={e=>e.target.style.color='var(--gold)'} onMouseLeave={e=>e.target.style.color='var(--mid)'}>{l}</button>
              ))}
            </div>
            <div>
              <p style={{fontSize:'11px',fontWeight:'600',letterSpacing:'2px',textTransform:'uppercase',fontFamily:'var(--fb)',marginBottom:'14px',color:'var(--dark)'}}>Info</p>
              {[['Ons Verhaal',()=>setView('story')],['Impact Dashboard',()=>setShowDash(s=>!s)],['Word lid',()=>document.getElementById('newsletter')?.scrollIntoView({behavior:'smooth'})],['Contact',()=>{}]].map(([l,fn])=>(
                <button key={l} onClick={fn} style={{display:'block',fontSize:'13px',color:'var(--mid)',fontFamily:'var(--fb)',background:'none',border:'none',cursor:'pointer',marginBottom:'8px',textAlign:'left',transition:'color 200ms'}}
                  onMouseEnter={e=>e.target.style.color='var(--gold)'} onMouseLeave={e=>e.target.style.color='var(--mid)'}>{l}</button>
              ))}
            </div>
            <div>
              <p style={{fontSize:'11px',fontWeight:'600',letterSpacing:'2px',textTransform:'uppercase',fontFamily:'var(--fb)',marginBottom:'14px',color:'var(--dark)'}}>Beloftes</p>
              {[
                [<Truck className="w-3.5 h-3.5"/>,'Gratis verzending boven €150'],
                [<RotateCcw className="w-3.5 h-3.5"/>,'30 dagen retour'],
                [<Leaf className="w-3.5 h-3.5"/>,'Cruelty-free & vegan'],
                [<Award className="w-3.5 h-3.5"/>,'Kwaliteitsgarantie'],
              ].map(([icon,txt])=>(
                <div key={txt} className="trust-row" style={{marginBottom:'10px'}}>
                  <span style={{color:'var(--gold)'}}>{icon}</span>
                  <span style={{fontSize:'12px'}}>{txt}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:'24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'12px'}}>
            <p style={{fontSize:'11px',color:'var(--mid)',fontFamily:'var(--fb)'}}>© 2026 AURA LUXE. Alle rechten voorbehouden.</p>
            <div style={{display:'flex',gap:'20px'}}>
              {['Privacy','Voorwaarden','Cookie-instellingen'].map(l=>(
                <a key={l} href="#" style={{fontSize:'11px',color:'var(--mid)',fontFamily:'var(--fb)',transition:'color 200ms'}}
                  onMouseEnter={e=>e.target.style.color='var(--gold)'} onMouseLeave={e=>e.target.style.color='var(--mid)'}>{l}</a>
              ))}
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
